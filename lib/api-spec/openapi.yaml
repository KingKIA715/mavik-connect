openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: "0.2.0"
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: groups
    description: Family group operations
  - name: messages
    description: Chat message operations
  - name: activity
    description: Cross-group activity feed
  - name: dms
    description: Direct message operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get current user's profile
      description: Returns (and JIT-provisions) the signed-in user's profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update the current user's display name
      description: >
        Keeps this app's local display name (shown on messages, DM lists,
        member lists, etc.) in sync after the user edits their first/last
        name through Clerk. Call this right after a successful Clerk
        `user.update({ firstName, lastName })` on the frontend — this
        endpoint does not talk to Clerk itself.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/public-key:
    put:
      operationId: setMyPublicKey
      tags: [users]
      summary: Set the current user's end-to-end encryption public key
      description: >
        Uploads the client-generated RSA-OAEP public key used to wrap
        per-group encryption keys for this user. Idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicKeyInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/search:
    get:
      operationId: searchUserByEmail
      tags: [users]
      summary: Search for a registered user by exact email match
      description: >
        Used to start a new DM thread, the same way group invites work.
        Returns 404 if no registered user matches the given email exactly.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchUserResult"
        "404":
          description: No user with that email

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List groups the current user belongs to
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get a group's detail including members
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDetail"
        "404":
          description: Not found

  /groups/{groupId}/members:
    post:
      operationId: addGroupMember
      tags: [groups]
      summary: Add a member to a group by email
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupMemberInput"
      responses:
        "201":
          description: Added member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMember"
        "404":
          description: User with that email not found

  /groups/{groupId}/key:
    get:
      operationId: getMyGroupKey
      tags: [groups]
      summary: Get the current user's wrapped end-to-end encryption key for a group
      description: >
        Returns the group's symmetric encryption key, wrapped with the
        current user's public key. Returns wrappedKey null if it has not
        been shared with this user yet.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wrapped group key, if shared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupKeyResponse"
        "404":
          description: Not found

  /groups/{groupId}/keys:
    post:
      operationId: setGroupKey
      tags: [groups]
      summary: Share a wrapped copy of the group's encryption key with a member
      description: >
        Stores a copy of the group's symmetric key, wrapped with the target
        member's public key. Called by any member who already holds the
        decrypted group key (e.g. the creator, or when re-sharing with a
        newly-invited member).
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupKeyInput"
      responses:
        "201":
          description: Stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupKeyResponse"
        "404":
          description: Not found

  /groups/{groupId}/members/{userId}:
    delete:
      operationId: removeGroupMember
      tags: [groups]
      summary: Remove a member from a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /groups/{groupId}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages in a group
      description: >
        Returns messages oldest-first. Use limit/offset query params for pagination.
        Defaults to 50 messages per page, maximum 100.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of messages, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /groups/{groupId}/messages/{messageId}:
    patch:
      operationId: editMessage
      tags: [messages]
      summary: Edit a text message you sent
      description: >
        Only the original sender can edit their own message, and only
        text messages can be edited (not file attachments).
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageEditInput"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not the sender, or not a text message
        "404":
          description: Not found
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message you sent
      description: >
        Soft-deletes the message: content and any attachment are cleared,
        but the message row remains (shown as "This message was deleted").
        Only the original sender can delete their own message.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted message (soft-deleted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not the sender
        "404":
          description: Not found

  /dms:
    get:
      operationId: listDmThreads
      tags: [dms]
      summary: List the current user's DM threads
      responses:
        "200":
          description: List of DM threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DmThread"
    post:
      operationId: createDmThread
      tags: [dms]
      summary: Start (or get the existing) DM thread with a user by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmThreadInput"
      responses:
        "201":
          description: Created (or existing) DM thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmThread"
        "404":
          description: User with that email not found

  /dms/{threadId}:
    get:
      operationId: getDmThread
      tags: [dms]
      summary: Get a DM thread's detail
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: DM thread detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmThread"
        "404":
          description: Not found

  /dms/{threadId}/key:
    get:
      operationId: getMyDmKey
      tags: [dms]
      summary: Get the current user's wrapped end-to-end encryption key for a DM thread
      description: >
        Returns the thread's symmetric encryption key, wrapped with the
        current user's public key. Returns wrappedKey null if it has not
        been shared with this user yet.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wrapped DM key, if shared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmKeyResponse"
        "404":
          description: Not found

  /dms/{threadId}/keys:
    post:
      operationId: setDmKey
      tags: [dms]
      summary: Share a wrapped copy of the DM thread's encryption key with a participant
      description: >
        Stores a copy of the thread's symmetric key, wrapped with the target
        participant's public key. Called by whichever participant already
        holds the decrypted thread key (e.g. the thread creator, or when
        re-sharing after the other participant sets their public key).
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmKeyInput"
      responses:
        "201":
          description: Stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmKeyResponse"
        "404":
          description: Not found

  /dms/{threadId}/messages:
    get:
      operationId: listDmMessages
      tags: [dms]
      summary: List messages in a DM thread
      description: >
        Returns messages oldest-first. Use limit/offset query params for pagination.
        Defaults to 50 messages per page, maximum 100.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of DM messages, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DmMessage"
    post:
      operationId: sendDmMessage
      tags: [dms]
      summary: Send a message in a DM thread
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmMessageInput"
      responses:
        "201":
          description: Created DM message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmMessage"

  /dms/{threadId}/messages/{messageId}:
    patch:
      operationId: editDmMessage
      tags: [dms]
      summary: Edit a text message you sent in a DM thread
      description: >
        Only the original sender can edit their own message, and only
        text messages can be edited (not file attachments).
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmMessageEditInput"
      responses:
        "200":
          description: Updated DM message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmMessage"
        "403":
          description: Not the sender, or not a text message
        "404":
          description: Not found
    delete:
      operationId: deleteDmMessage
      tags: [dms]
      summary: Delete a message you sent in a DM thread
      description: >
        Soft-deletes the message: content and any attachment are cleared,
        but the message row remains (shown as "This message was deleted").
        Only the original sender can delete their own message.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted DM message (soft-deleted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmMessage"
        "403":
          description: Not the sender
        "404":
          description: Not found

  /activity:
    get:
      operationId: getRecentActivity
      tags: [activity]
      summary: Get recent messages across all of the user's groups
      description: >
        Returns recent activity newest-first. Use limit/offset query params for pagination.
        Defaults to 30 items per page, maximum 100.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserProfile:
      type: object
      required: [id, email, name, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        publicKey:
          type: ["string", "null"]
        createdAt:
          type: string

    PublicKeyInput:
      type: object
      required: [publicKey]
      properties:
        publicKey:
          type: string
          minLength: 1

    UpdateMyProfileInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    Group:
      type: object
      required: [id, name, createdBy, createdAt, memberCount]
      properties:
        id:
          type: string
        name:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
        memberCount:
          type: integer
        lastMessageAt:
          type: ["string", "null"]
        lastMessagePreview:
          type: ["string", "null"]

    GroupInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    GroupMember:
      type: object
      required: [userId, name, email, role, joinedAt, hasEncryptionKey]
      properties:
        userId:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        publicKey:
          type: ["string", "null"]
        hasEncryptionKey:
          type: boolean
        role:
          type: string
        joinedAt:
          type: string

    GroupKeyResponse:
      type: object
      required: [groupId, wrappedKey]
      properties:
        groupId:
          type: string
        wrappedKey:
          type: ["string", "null"]

    GroupKeyInput:
      type: object
      required: [userId, wrappedKey]
      properties:
        userId:
          type: string
        wrappedKey:
          type: string
          minLength: 1

    GroupMemberInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    GroupDetail:
      type: object
      required: [id, name, createdBy, createdAt, members]
      properties:
        id:
          type: string
        name:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"

    Message:
      type: object
      required: [id, groupId, senderId, senderName, content, type, createdAt]
      properties:
        id:
          type: string
        groupId:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderAvatarUrl:
          type: ["string", "null"]
        content:
          type: string
        type:
          type: string
          enum: [text, file]
          default: text
        fileName:
          type: ["string", "null"]
        mimeType:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        createdAt:
          type: string
        editedAt:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        type:
          type: string
          enum: [text, file]
          default: text
        fileName:
          type: ["string", "null"]
        mimeType:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]

    MessageEditInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    ActivityItem:
      type: object
      required: [groupId, groupName, senderId, senderName, content, createdAt]
      properties:
        groupId:
          type: string
        groupName:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        content:
          type: string
        createdAt:
          type: string

    SearchUserResult:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        publicKey:
          type: ["string", "null"]

    DmThreadInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    DmThread:
      type: object
      required: [id, otherUserId, otherUserName, otherUserEmail, otherUserHasEncryptionKey, createdAt]
      properties:
        id:
          type: string
        otherUserId:
          type: string
        otherUserName:
          type: string
        otherUserEmail:
          type: string
        otherUserAvatarUrl:
          type: ["string", "null"]
        otherUserPublicKey:
          type: ["string", "null"]
        otherUserHasEncryptionKey:
          type: boolean
        createdAt:
          type: string
        lastMessageAt:
          type: ["string", "null"]
        lastMessagePreview:
          type: ["string", "null"]

    DmMessage:
      type: object
      required: [id, threadId, senderId, senderName, content, type, createdAt]
      properties:
        id:
          type: string
        threadId:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderAvatarUrl:
          type: ["string", "null"]
        content:
          type: string
        type:
          type: string
          enum: [text, file]
          default: text
        fileName:
          type: ["string", "null"]
        mimeType:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        createdAt:
          type: string
        editedAt:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]

    DmMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        type:
          type: string
          enum: [text, file]
          default: text
        fileName:
          type: ["string", "null"]
        mimeType:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]

    DmMessageEditInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    DmKeyResponse:
      type: object
      required: [threadId, wrappedKey]
      properties:
        threadId:
          type: string
        wrappedKey:
          type: ["string", "null"]

    DmKeyInput:
      type: object
      required: [userId, wrappedKey]
      properties:
        userId:
          type: string
        wrappedKey:
          type: string
          minLength: 1
