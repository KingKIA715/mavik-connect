openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: "0.2.0"
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: groups
    description: Family group operations
  - name: messages
    description: Chat message operations
  - name: activity
    description: Cross-group activity feed
  - name: dms
    description: Direct message operations
  - name: push
    description: Web Push notification subscription management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get current user's profile
      description: Returns (and JIT-provisions) the signed-in user's profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update the current user's profile fields
      description: >
        Updates firstName, lastName, and phoneNumber as plain profile
        fields directly on this app's own users table — no Clerk call, no
        SMS/OTP verification. The server recomputes the derived `name`
        field from firstName/lastName and returns it in the response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/public-key:
    put:
      operationId: setMyPublicKey
      tags: [users]
      summary: Set the current user's end-to-end encryption public key
      description: >
        Uploads the client-generated RSA-OAEP public key used to wrap
        per-group encryption keys for this user. Idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicKeyInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/key-history:
    get:
      operationId: getKeyHistory
      tags: [users]
      summary: List when this user's encryption key was set or changed
      description: >
        Not a full multi-device trust/revoke system — this app only holds
        one active keypair per user, so there's no per-device key to
        individually revoke. This is a read-only timeline (most recent
        first) of when the key was set or rotated and a rough
        browser/OS guess from the User-Agent at the time, so someone can
        tell "that's why my other browser stopped working" rather than a
        security control.
      responses:
        "200":
          description: Key history, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KeyRotationEntry"

  /push/vapid-public-key:
    get:
      operationId: getVapidPublicKey
      tags: [push]
      summary: Get the server's VAPID public key
      description: >
        Needed by the browser's PushManager.subscribe() call. May be null
        if the server doesn't have push configured (e.g. local dev) — the
        client should treat that as "notifications unavailable" rather
        than erroring.
      responses:
        "200":
          description: The public key, or null if push isn't configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapidPublicKeyResult"

  /push/subscribe:
    post:
      operationId: subscribeToPush
      tags: [push]
      summary: Register a browser push subscription for the current user
      description: >
        Upserted by endpoint — re-subscribing the same browser updates its
        keys rather than creating a duplicate. A user can have several
        (one per browser/device).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscriptionInput"
      responses:
        "200":
          description: Subscribed
    delete:
      operationId: unsubscribeFromPush
      tags: [push]
      summary: Remove a browser push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnsubscribePushInput"
      responses:
        "200":
          description: Unsubscribed (or was already not subscribed)

  /users/search:
    get:
      operationId: searchUserByEmail
      tags: [users]
      summary: Search for a registered user by exact email match
      description: >
        Used to start a new DM thread, the same way group invites work.
        Returns 404 if no registered user matches the given email exactly.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchUserResult"
        "404":
          description: No user with that email

  /users/search/by-name:
    get:
      operationId: searchUsersByName
      tags: [users]
      summary: Search registered users by name (case-insensitive, partial match)
      description: >
        Open name search over all registered users — not limited to
        existing contacts or shared groups. Used to find someone to start a
        new DM with (see Item 2's message-request flow for what happens
        after a thread is created with someone new). Matches against
        firstName, lastName, or the combined display name. Excludes the
        caller. Returns an empty array (not 404) if nothing matches.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Matching users (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchUserResult"

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List groups the current user belongs to
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get a group's detail including members
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete an entire group
      description: >
        Only the group's creator can do this. Deletes the group and
        everything in it (members, messages, encryption keys) via cascading
        foreign keys, and notifies any currently-connected members over
        WebSocket so their clients can leave the chat immediately.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Not the group's creator
        "404":
          description: Not found

  /groups/{groupId}/avatar:
    put:
      operationId: setGroupAvatar
      tags: [groups]
      summary: Set or clear a group's photo
      description: >
        Body is a small base64 data URI — the client resizes to a thumbnail
        before uploading. Not E2E-encrypted (same tradeoff as a user's
        profile photo). Pass null to remove the current photo. Any member
        may change it.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetGroupAvatarInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetGroupAvatarInput"
        "400":
          description: Image too large or not a data URI
        "404":
          description: Not found

  /groups/{groupId}/members:
    post:
      operationId: addGroupMember
      tags: [groups]
      summary: Add a member to a group by email
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupMemberInput"
      responses:
        "201":
          description: Added member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMember"
        "404":
          description: User with that email not found

  /groups/{groupId}/key:
    get:
      operationId: getMyGroupKey
      tags: [groups]
      summary: Get the current user's wrapped end-to-end encryption key for a group
      description: >
        Returns the group's symmetric encryption key, wrapped with the
        current user's public key. Returns wrappedKey null if it has not
        been shared with this user yet.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wrapped group key, if shared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupKeyResponse"
        "404":
          description: Not found

  /groups/{groupId}/keys:
    post:
      operationId: setGroupKey
      tags: [groups]
      summary: Share a wrapped copy of the group's encryption key with a member
      description: >
        Stores a copy of the group's symmetric key, wrapped with the target
        member's public key. Called by any member who already holds the
        decrypted group key (e.g. the creator, or when re-sharing with a
        newly-invited member).
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupKeyInput"
      responses:
        "201":
          description: Stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupKeyResponse"
        "404":
          description: Not found

  /groups/{groupId}/keys/request:
    post:
      operationId: requestGroupKeyAccess
      tags: [groups]
      summary: Ask other connected members to re-share the group key with me
      description: >
        Used when this browser's copy of the group key is missing (e.g. its
        private key was lost when the browser's storage was cleared). Pings
        any other member currently connected to this group over WebSocket;
        if their client already holds the decrypted group key, it re-wraps
        and re-shares it for this user automatically. Best-effort — if no
        other member is currently viewing this group, nothing happens until
        one of them opens it (or requests again later).
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Request broadcast (delivery not guaranteed)
        "404":
          description: Not found

  /groups/{groupId}/read:
    put:
      operationId: markGroupRead
      tags: [groups]
      summary: Mark a group as read up to now, for the current user
      description: >
        Sets the current user's last-read timestamp for this group to now.
        Powers unread badges (client compares each message's createdAt
        against this timestamp) and "Seen" receipts (the sender compares
        their last message's createdAt against every other member's
        last-read timestamp). Broadcasts a WS "read" event so anyone
        currently viewing the group updates seen-status live.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated read receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadReceipt"
        "404":
          description: Not found

  /groups/{groupId}/pin:
    put:
      operationId: setGroupPinned
      tags: [groups]
      summary: Pin or unpin a group in the current user's own chat list
      description: >
        Purely personal — this only affects how the group sorts in the
        caller's own list, not for any other member.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPinnedInput"
      responses:
        "200":
          description: Updated pin state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinnedResult"
        "404":
          description: Not found

  /groups/{groupId}/mute:
    put:
      operationId: setGroupMuted
      tags: [groups]
      summary: Mute or unmute a group for the current user
      description: >
        Purely personal — silences notifications for this group for the
        caller only. Never affects the caller's ability to send or receive
        messages, or any other member's settings.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMutedInput"
      responses:
        "200":
          description: Updated mute state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutedResult"
        "404":
          description: Not found

  /groups/{groupId}/calls/join:
    post:
      operationId: joinGroupCall
      tags: [groups]
      summary: Join (starting if needed) this group's call
      description: >
        Group calls are a shared room, not a 1:1 ring — unlike DM calls,
        there's no per-person "missed" tracking, no ring, and no push. If a
        call is already active for this group, joins that one (no new log
        entry); otherwise starts a new one. A compact summary ("Video call
        · 12m") is written into the group's messages once the last
        participant leaves (see the /leave endpoint).
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinGroupCallInput"
      responses:
        "200":
          description: Joined (or started) the call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinGroupCallResult"
        "404":
          description: Not found

  /groups/{groupId}/calls/{callId}/leave:
    post:
      operationId: leaveGroupCall
      tags: [groups]
      summary: Leave this group's call
      description: >
        If this was the last active participant, finalizes the call and
        writes its duration summary into the group's messages.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: callId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Left
        "404":
          description: Not found

  /groups/{groupId}/members/{userId}:
    delete:
      operationId: removeGroupMember
      tags: [groups]
      summary: Remove a member from a group, or leave it yourself
      description: >
        Any member can remove themselves (leave the group). Removing
        someone else requires being the group's creator. Either way, a
        "system" message announcing the departure is inserted into the
        group's chat history and broadcast live to remaining members.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed
        "403":
          description: Only the group's creator can remove other members
        "404":
          description: Not found

  /groups/{groupId}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages in a group
      description: >
        Returns messages oldest-first. Use limit/offset query params for pagination.
        Defaults to 50 messages per page, maximum 100.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of messages, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "429":
          description: Rate limited — sending messages too quickly

  /groups/{groupId}/messages/{messageId}:
    patch:
      operationId: editMessage
      tags: [messages]
      summary: Edit a text message you sent
      description: >
        Only the original sender can edit their own message, and only
        text messages can be edited (not file attachments).
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageEditInput"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not the sender, or not a text message
        "404":
          description: Not found
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message you sent
      description: >
        Soft-deletes the message: content and any attachment are cleared,
        but the message row remains (shown as "This message was deleted").
        Only the original sender can delete their own message.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted message (soft-deleted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not the sender
        "404":
          description: Not found

  /groups/{groupId}/messages/{messageId}/reactions:
    put:
      operationId: toggleMessageReaction
      tags: [messages]
      summary: Toggle your reaction on a message
      description: >
        If you've already reacted with this emoji, removes it; otherwise
        adds it. Any current group member may react, including to their own
        messages. Returns the message's full updated reaction list.
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleReactionInput"
      responses:
        "200":
          description: Updated reactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageReaction"
        "404":
          description: Not found

  /dms:
    get:
      operationId: listDmThreads
      tags: [dms]
      summary: List the current user's DM threads
      responses:
        "200":
          description: List of DM threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DmThread"
    post:
      operationId: createDmThread
      tags: [dms]
      summary: Start (or get the existing) DM thread with a user by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmThreadInput"
      responses:
        "201":
          description: Created (or existing) DM thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmThread"
        "404":
          description: User with that email not found

  /dms/{threadId}:
    get:
      operationId: getDmThread
      tags: [dms]
      summary: Get a DM thread's detail
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: DM thread detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmThread"
        "404":
          description: Not found
    delete:
      operationId: deleteDmThread
      tags: [dms]
      summary: Delete an entire DM thread
      description: >
        Either participant can do this (unlike groups, a DM thread has no
        single "owner"). Deletes the thread and everything in it (messages,
        encryption keys) via cascading foreign keys, and notifies the other
        participant over WebSocket if they're currently viewing it so their
        client can leave the chat immediately.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /dms/{threadId}/key:
    get:
      operationId: getMyDmKey
      tags: [dms]
      summary: Get the current user's wrapped end-to-end encryption key for a DM thread
      description: >
        Returns the thread's symmetric encryption key, wrapped with the
        current user's public key. Returns wrappedKey null if it has not
        been shared with this user yet.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wrapped DM key, if shared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmKeyResponse"
        "404":
          description: Not found

  /dms/{threadId}/keys:
    post:
      operationId: setDmKey
      tags: [dms]
      summary: Share a wrapped copy of the DM thread's encryption key with a participant
      description: >
        Stores a copy of the thread's symmetric key, wrapped with the target
        participant's public key. Called by whichever participant already
        holds the decrypted thread key (e.g. the thread creator, or when
        re-sharing after the other participant sets their public key).
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmKeyInput"
      responses:
        "201":
          description: Stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmKeyResponse"
        "404":
          description: Not found

  /dms/{threadId}/keys/request:
    post:
      operationId: requestDmKeyAccess
      tags: [dms]
      summary: Ask the other participant to re-share the thread key with me
      description: >
        Same idea as requestGroupKeyAccess, for a DM thread. Best-effort —
        only takes effect if the other participant is currently connected
        to this thread and already holds the decrypted key.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Request sent (delivery not guaranteed)
        "404":
          description: Not found

  /dms/{threadId}/read:
    put:
      operationId: markDmThreadRead
      tags: [dms]
      summary: Mark a DM thread as read up to now, for the current user
      description: >
        Sets the current user's last-read timestamp for this thread to now.
        Powers unread badges (client compares each message's createdAt
        against this timestamp) and the "Seen" receipt (the sender compares
        their last message's createdAt against the other participant's
        last-read timestamp). Broadcasts a WS "read" event so the other
        participant, if currently viewing the thread, updates seen-status
        live.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated read receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadReceipt"
        "404":
          description: Not found

  /dms/{threadId}/pin:
    put:
      operationId: setDmThreadPinned
      tags: [dms]
      summary: Pin or unpin a DM thread in the current user's own chat list
      description: >
        Purely personal, like read receipts — only affects how this thread
        sorts in the caller's own list, not the other participant's.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPinnedInput"
      responses:
        "200":
          description: Updated pin state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinnedResult"
        "404":
          description: Not found

  /dms/{threadId}/mute:
    put:
      operationId: setDmThreadMuted
      tags: [dms]
      summary: Mute or unmute a DM thread for the current user
      description: >
        Purely personal, like pinning — silences notifications for this
        thread for the caller only, and never affects the caller's ability
        to send or receive messages, or the other participant's settings.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMutedInput"
      responses:
        "200":
          description: Updated mute state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutedResult"
        "404":
          description: Not found

  /dms/{threadId}/respond:
    put:
      operationId: respondToDmThread
      tags: [dms]
      summary: Accept or reject a pending DM message request
      description: >
        Only the non-initiator (recipient) of a "pending" thread can call
        this, and only while it's still pending. Rejecting is a
        one-directional permanent block: the initiator can never send into
        this thread again, but the recipient still can (e.g. if they
        change their mind and reach out themselves later). Broadcasts a WS
        "dm-request-responded" event so the initiator's UI updates live.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondToDmThreadInput"
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespondToDmThreadResult"
        "403":
          description: Not the recipient of this request
        "404":
          description: Not found
        "409":
          description: Already responded to

  /dms/{threadId}/calls:
    post:
      operationId: startDmCall
      tags: [dms]
      summary: Start a voice or video call in a DM thread
      description: >
        Creates a ringing call and notifies the other participant over
        their app-wide WebSocket connection (delivered regardless of which
        page they're on, not just this specific conversation). Subject to
        the same permission rule as sending a message (canSendDm) — you
        can't call someone you currently can't message. Rings for 45
        seconds; if unanswered, the call is auto-finalized as "missed" and
        a compact summary is written into the thread as a message.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartDmCallInput"
      responses:
        "201":
          description: Call started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDmCallResult"
        "403":
          description: Not allowed to call this person right now
        "404":
          description: Not found

  /dms/{threadId}/calls/{callId}/answer:
    post:
      operationId: answerDmCall
      tags: [dms]
      summary: Answer a ringing incoming DM call
      description: >
        Only the callee (not the caller) may answer, and only while the
        call is still "ringing". Notifies the caller over their app-wide
        connection so any other tab/device they have open stops ringing.
        The actual media connection still happens over the existing
        per-thread WebRTC signaling once the client navigates to the call
        screen — this only marks the call as answered.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: callId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked answered
        "403":
          description: Not allowed
        "404":
          description: Not found

  /dms/{threadId}/calls/{callId}/decline:
    post:
      operationId: declineDmCall
      tags: [dms]
      summary: Decline a ringing incoming DM call
      description: >
        Only the callee may decline, and only while still "ringing".
        Immediately finalizes and logs the call as "declined" and notifies
        the caller.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: callId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Declined
        "404":
          description: Not found

  /dms/{threadId}/calls/{callId}/end:
    post:
      operationId: endDmCall
      tags: [dms]
      summary: End or cancel a DM call
      description: >
        Either participant may call this. If the call was still "ringing",
        finalizes it as "cancelled" (logged the same as a missed call) and
        notifies the other side. If it was "answered", finalizes it as
        "ended" with a duration.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: callId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ended
        "403":
          description: Not allowed
        "404":
          description: Not found

  /dms/{threadId}/messages:
    get:
      operationId: listDmMessages
      tags: [dms]
      summary: List messages in a DM thread
      description: >
        Returns messages oldest-first. Use limit/offset query params for pagination.
        Defaults to 50 messages per page, maximum 100.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of DM messages, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DmMessage"
    post:
      operationId: sendDmMessage
      tags: [dms]
      summary: Send a message in a DM thread
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmMessageInput"
      responses:
        "201":
          description: Created DM message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmMessage"
        "429":
          description: Rate limited — sending messages too quickly

  /dms/{threadId}/messages/{messageId}:
    patch:
      operationId: editDmMessage
      tags: [dms]
      summary: Edit a text message you sent in a DM thread
      description: >
        Only the original sender can edit their own message, and only
        text messages can be edited (not file attachments).
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmMessageEditInput"
      responses:
        "200":
          description: Updated DM message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmMessage"
        "403":
          description: Not the sender, or not a text message
        "404":
          description: Not found
    delete:
      operationId: deleteDmMessage
      tags: [dms]
      summary: Delete a message you sent in a DM thread
      description: >
        Soft-deletes the message: content and any attachment are cleared,
        but the message row remains (shown as "This message was deleted").
        Only the original sender can delete their own message.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted DM message (soft-deleted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmMessage"
        "403":
          description: Not the sender
        "404":
          description: Not found

  /dms/{threadId}/messages/{messageId}/reactions:
    put:
      operationId: toggleDmMessageReaction
      tags: [dms]
      summary: Toggle your reaction on a DM message
      description: >
        If you've already reacted with this emoji, removes it; otherwise
        adds it. Returns the message's full updated reaction list.
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleReactionInput"
      responses:
        "200":
          description: Updated reactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageReaction"
        "404":
          description: Not found

  /activity:
    get:
      operationId: getRecentActivity
      tags: [activity]
      summary: Get recent messages across all of the user's groups
      description: >
        Returns recent activity newest-first. Use limit/offset query params for pagination.
        Defaults to 30 items per page, maximum 100.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    KeyRotationEntry:
      type: object
      required: [occurredAt, userAgent]
      properties:
        occurredAt:
          type: string
        userAgent:
          type: ["string", "null"]

    ReadReceipt:
      type: object
      required: [lastReadAt]
      properties:
        lastReadAt:
          type: string

    SetGroupAvatarInput:
      type: object
      required: [avatarUrl]
      properties:
        avatarUrl:
          type: ["string", "null"]

    ToggleReactionInput:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string
          minLength: 1
          maxLength: 8

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserProfile:
      type: object
      required: [id, email, name, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
          description: >
            Derived display name, recomputed server-side from
            firstName/lastName on every profile update.
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
          description: >
            E.164 format (e.g. +14155551234). Format-validated only — not
            verified to belong to the user.
        avatarUrl:
          type: ["string", "null"]
        publicKey:
          type: ["string", "null"]
        createdAt:
          type: string

    PublicKeyInput:
      type: object
      required: [publicKey]
      properties:
        publicKey:
          type: string
          minLength: 1

    VapidPublicKeyResult:
      type: object
      required: [publicKey]
      properties:
        publicKey:
          type: ["string", "null"]

    PushSubscriptionInput:
      type: object
      required: [endpoint, keys]
      properties:
        endpoint:
          type: string
          minLength: 1
        keys:
          type: object
          required: [p256dh, auth]
          properties:
            p256dh:
              type: string
              minLength: 1
            auth:
              type: string
              minLength: 1

    UnsubscribePushInput:
      type: object
      required: [endpoint]
      properties:
        endpoint:
          type: string
          minLength: 1

    UpdateMyProfileInput:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        phoneNumber:
          type: ["string", "null"]
          description: >
            E.164 format (e.g. +14155551234), or null to clear it.
            Format-validated server-side; not verified to belong to the
            user.
          pattern: "^\\+[1-9]\\d{6,14}$"

    Group:
      type: object
      required:
        [
          id,
          name,
          createdBy,
          createdAt,
          memberCount,
          unreadCount,
          isPinned,
          isMuted,
        ]
      properties:
        id:
          type: string
        name:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
        avatarUrl:
          type: ["string", "null"]
        memberCount:
          type: integer
        lastMessageAt:
          type: ["string", "null"]
        lastMessagePreview:
          type: ["string", "null"]
        myLastReadAt:
          type: ["string", "null"]
        unreadCount:
          type: integer
          description: Messages from other members created after myLastReadAt.
        isPinned:
          type: boolean
          description: >
            Whether the current user has pinned this group to the top of
            their own chat list. Purely personal — pinning is per-member,
            not a group-wide setting.
        isMuted:
          type: boolean
          description: >
            Whether the current user has muted notifications for this
            group. Purely personal, like isPinned — never affects sending
            or receiving messages.

    GroupInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    SetPinnedInput:
      type: object
      required: [pinned]
      properties:
        pinned:
          type: boolean

    PinnedResult:
      type: object
      required: [isPinned]
      properties:
        isPinned:
          type: boolean

    SetMutedInput:
      type: object
      required: [muted]
      properties:
        muted:
          type: boolean

    MutedResult:
      type: object
      required: [isMuted]
      properties:
        isMuted:
          type: boolean

    JoinGroupCallInput:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [audio, video]

    JoinGroupCallResult:
      type: object
      required: [callId]
      properties:
        callId:
          type: string

    GroupMember:
      type: object
      required:
        [userId, name, email, role, joinedAt, hasEncryptionKey, lastReadAt]
      properties:
        userId:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        publicKey:
          type: ["string", "null"]
        hasEncryptionKey:
          type: boolean
        role:
          type: string
        joinedAt:
          type: string
        lastReadAt:
          type: ["string", "null"]
          description: >
            Last time this member marked the group as read. Used by other
            members to compute a "Seen" receipt on their own last message.

    GroupKeyResponse:
      type: object
      required: [groupId, wrappedKey]
      properties:
        groupId:
          type: string
        wrappedKey:
          type: ["string", "null"]

    GroupKeyInput:
      type: object
      required: [userId, wrappedKey]
      properties:
        userId:
          type: string
        wrappedKey:
          type: string
          minLength: 1

    GroupMemberInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    GroupDetail:
      type: object
      required: [id, name, createdBy, createdAt, members, isMuted]
      properties:
        id:
          type: string
        name:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isMuted:
          type: boolean
          description: >
            Whether the current user has muted notifications for this
            group. Purely personal — never affects sending or receiving
            messages.
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"

    MessageReaction:
      type: object
      required: [emoji, userIds]
      properties:
        emoji:
          type: string
        userIds:
          type: array
          items:
            type: string

    MessageReplyPreview:
      type: object
      description: >
        A denormalized snapshot of the message being replied to, so clients
        can render a quoted snippet without needing that message to already
        be loaded on the page. `content` is still E2E-encrypted ciphertext
        (the server never sees plaintext), decrypted client-side same as
        any other message.
      required: [id, senderId, senderName, content, type, deletedAt]
      properties:
        id:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [text, file, voice]
        fileName:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]
          description: If set, the quoted message was deleted; show a placeholder instead of the (now-cleared) content.

    Message:
      type: object
      required:
        [
          id,
          groupId,
          senderId,
          senderName,
          content,
          type,
          createdAt,
          reactions,
          mentionedUserIds,
        ]
      properties:
        id:
          type: string
        groupId:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderAvatarUrl:
          type: ["string", "null"]
        content:
          type: string
        type:
          type: string
          enum: [text, file, voice, system, call]
          default: text
        fileName:
          type: ["string", "null"]
        mimeType:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        durationSeconds:
          type: ["integer", "null"]
          description: Playback duration in seconds, for voice messages.
        replyToId:
          type: ["string", "null"]
        replyTo:
          oneOf:
            - $ref: "#/components/schemas/MessageReplyPreview"
            - type: "null"
        mentionedUserIds:
          type: array
          items:
            type: string
          description: Group member user IDs tagged with @mentions in this message.
        createdAt:
          type: string
        editedAt:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/MessageReaction"

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        type:
          type: string
          enum: [text, file, voice]
          default: text
        fileName:
          type: ["string", "null"]
        mimeType:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        durationSeconds:
          type: ["integer", "null"]
        replyToId:
          type: ["string", "null"]
        mentionedUserIds:
          type: array
          items:
            type: string

    MessageEditInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    ActivityItem:
      type: object
      required: [groupId, groupName, senderId, senderName, content, createdAt]
      properties:
        groupId:
          type: string
        groupName:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        content:
          type: string
        createdAt:
          type: string

    SearchUserResult:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        publicKey:
          type: ["string", "null"]

    DmThreadInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    DmThread:
      type: object
      required:
        [
          id,
          otherUserId,
          otherUserName,
          otherUserEmail,
          otherUserHasEncryptionKey,
          createdAt,
          unreadCount,
          status,
          isInitiatedByMe,
          isPinned,
          isMuted,
        ]
      properties:
        id:
          type: string
        otherUserId:
          type: string
        otherUserName:
          type: string
        otherUserEmail:
          type: string
        otherUserAvatarUrl:
          type: ["string", "null"]
        otherUserPublicKey:
          type: ["string", "null"]
        otherUserHasEncryptionKey:
          type: boolean
        createdAt:
          type: string
        lastMessageAt:
          type: ["string", "null"]
        lastMessagePreview:
          type: ["string", "null"]
        myLastReadAt:
          type: ["string", "null"]
        otherUserLastReadAt:
          type: ["string", "null"]
          description: >
            Used by the current user to compute a "Seen" receipt on their
            own last message in this thread.
        unreadCount:
          type: integer
          description: Messages from the other participant created after myLastReadAt.
        status:
          type: string
          enum: [pending, accepted, rejected]
          description: >
            Message-request status. "pending": only the initiator can send,
            until the other side accepts/rejects via PUT
            /dms/{threadId}/respond. "accepted": both sides can send
            freely. "rejected": a one-directional permanent block on the
            initiator only — see canSendDm in the API server.
        isInitiatedByMe:
          type: boolean
          description: Whether the current user was the one who started this thread.
        isPinned:
          type: boolean
          description: >
            Whether the current user has pinned this thread to the top of
            their own chat list. Per-side, like the read receipts — the
            other participant pinning it doesn't affect your view.
        isMuted:
          type: boolean
          description: >
            Whether the current user has muted notifications for this
            thread. Per-side, like isPinned — never affects sending or
            receiving messages.

    RespondToDmThreadInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, reject]

    RespondToDmThreadResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, rejected]

    StartDmCallInput:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [audio, video]

    StartDmCallResult:
      type: object
      required: [callId, calleeOnline]
      properties:
        callId:
          type: string
        calleeOnline:
          type: boolean
          description: >
            Whether the callee currently has the app open at all (any
            device/tab). Purely informational for the caller's UI (e.g. to
            show "ringing" vs a softer "they might not see this right
            away") — the ring is still sent either way, and Phase 2 will
            use this same signal to decide whether to also send a push
            notification.

    DmMessage:
      type: object
      required:
        [
          id,
          threadId,
          senderId,
          senderName,
          content,
          type,
          createdAt,
          reactions,
        ]
      properties:
        id:
          type: string
        threadId:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderAvatarUrl:
          type: ["string", "null"]
        content:
          type: string
        type:
          type: string
          enum: [text, file, voice, call]
          default: text
        fileName:
          type: ["string", "null"]
        mimeType:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        durationSeconds:
          type: ["integer", "null"]
          description: Playback duration in seconds, for voice messages.
        replyToId:
          type: ["string", "null"]
        replyTo:
          oneOf:
            - $ref: "#/components/schemas/MessageReplyPreview"
            - type: "null"
        createdAt:
          type: string
        editedAt:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/MessageReaction"

    DmMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        type:
          type: string
          enum: [text, file, voice]
          default: text
        fileName:
          type: ["string", "null"]
        mimeType:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        durationSeconds:
          type: ["integer", "null"]
        replyToId:
          type: ["string", "null"]

    DmMessageEditInput:
      type: object
      required: [content]
      properties:
        content:
