<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mavik Connect — Offline</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FAFAFA;
      color: #2C5F8A;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card { max-width: 360px; }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    p { color: #555; line-height: 1.5; }
    button {
      margin-top: 16px;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #2C5F8A;
      background: #2C5F8A;
      color: white;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Mavik Connect can't reach the network right now. Check your connection and try again — your messages are safe and waiting.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
