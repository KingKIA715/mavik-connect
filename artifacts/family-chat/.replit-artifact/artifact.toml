kind = "web"
previewPath = "/"
title = "Mavik Connect"
version = "1.0.0"
id = "artifacts/family-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20730

[services.development]
run = "pnpm --filter @workspace/family-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/family-chat", "run", "build" ]
publicDir = "artifacts/family-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20730"
BASE_PATH = "/"
